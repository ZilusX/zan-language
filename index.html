<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zilus Smart Translator & Audio 🪐</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --accent-color: #58a6ff;
            --text-color: #c9d1d9;
            --neon-green: #7ee787;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
            border: 1px solid #21262d;
        }
        h1 { color: var(--accent-color); margin-bottom: 5px; }
        p.subtitle { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            background: #21262d;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
            resize: none;
            direction: ltr;
            text-align: left;
        }
        button.btn-translate {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        button.btn-translate:hover { background-color: #1f6feb; }
        .box-title {
            text-align: right;
            font-size: 14px;
            color: var(--accent-color);
            margin-top: 20px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .output-box {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 6px;
            text-align: left;
            direction: ltr;
            min-height: 50px;
            font-family: monospace;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        #symbolsOutput { font-size: 22px; color: var(--neon-green); letter-spacing: 1px; }
        #englishOutput { font-size: 18px; color: #fff; }
        
        /* تصميم كتل الكلمات مع أزرار النطق */
        .word-block {
            display: inline-flex;
            align-items: center;
            background: #21262d;
            border: 1px solid #30363d;
            padding: 5px 10px;
            border-radius: 6px;
            margin: 5px;
        }
        .word-text {
            color: #fff;
            font-weight: bold;
            margin-right: 10px;
            font-size: 16px;
        }
        .btn-speak {
            background: #30363d;
            color: var(--neon-green);
            border: 1px solid #444c56;
            padding: 3px 8px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-speak:hover {
            background: var(--neon-green);
            color: #0d1117;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>المترجم الذكي ونظام النطق المطور 🪐</h1>
    <p class="subtitle">اكتب نصك بالإنجليزية وسيظهر لك النطق المكتوب مع زر تشغيل صوتي مخصص لكل كلمة</p>

    <textarea id="inputText" placeholder="ضع هنا نصاً إنجليزياً (مثل: good) واضغط ترجمة..."></textarea>
    <button class="btn-translate" onclick="smartTranslate()">ترجم النص الآن</button>

    <div class="box-title">الترجمة البصرية (الرموز السرية):</div>
    <div id="symbolsOutput" class="output-box">...</div>

    <div class="box-title">النطق الصوتي (اضغط على زر 🔊 للكلمة التي تريد سماعها):</div>
    <div id="englishOutput" class="output-box">...</div>
</div>

<script>
const zilusAlphabet = {
    'a': { symbol: '⏃', sound: 'سا' }, 'b': { symbol: '⏚', sound: 'بارو' },
    'c': { symbol: '☊', sound: 'سن' }, 'd': { symbol: '⎅', sound: 'دا' },
    'e': { symbol: '⟒', sound: 'سي' }, 'f': { symbol: '⎎', sound: 'يون' },
    'g': { symbol: '☌', sound: 'سين' }, 'h': { symbol: '⊑', sound: 'هام' },
    'i': { symbol: '⟟', sound: 'از' }, 'j': { symbol: '⟊', sound: 'ام' },
    'k': { symbol: '☍', sound: 'نان' }, 'l': { symbol: '⌰', sound: 'سير' },
    'm': { symbol: '⋔', sound: 'مايري' }, 'n': { symbol: '⋏', sound: 'ني' },
    'o': { symbol: '⍜', sound: 'سو' }, 'p': { symbol: '⌿', sound: 'ان' },
    'q': { symbol: '⍾', sound: 'قو' }, 'r': { symbol: '⍀', sound: 'نا' },
    's': { symbol: '⌇', sound: 'كي' }, 't': { symbol: '⏁', sound: 'هي' },
    'u': { symbol: '⎍', sound: 'ماي' }, 'v': { symbol: '⎐', sound: 'فاين' },
    'w': { symbol: '⍙', sound: 'يو' }, 'x': { symbol: '⌖', sound: 'اش' },
    'y': { symbol: '⊬', sound: 'جو' }, 'z': { symbol: '⋉', sound: 'زاد' }
};

const reverseSymbols = {};
Object.keys(zilusAlphabet).forEach(key => {
    const sym = zilusAlphabet[key].symbol.trim();
    reverseSymbols[sym] = key;
});

function smartTranslate() {
    const input = document.getElementById("inputText").value;
    const symbolsOutput = document.getElementById("symbolsOutput");
    const englishOutput = document.getElementById("englishOutput");

    if (!input.trim()) {
        alert("الرجاء إدخال نص أولاً!");
        return;
    }

    let hasZilusSymbols = false;
    const sampleSymbols = Object.values(zilusAlphabet).map(item => item.symbol);
    for (let sym of sampleSymbols) {
        if (input.includes(sym)) {
            hasZilusSymbols = true;
            break;
        }
    }

    if (hasZilusSymbols) {
        // فك التشفير من الرموز للإنجليزية
        let englishResult = "";
        let charsArray = Array.from(input); 

        for (let i = 0; i < charsArray.length; i++) {
            let char = charsArray[i];
            if (reverseSymbols[char]) {
                englishResult += reverseSymbols[char];
            } else {
                englishResult += char;
            }
        }
        symbolsOutput.innerHTML = input;
        englishOutput.innerHTML = `<span style="color:var(--accent-color); font-weight:bold; font-size:18px;">${englishResult.toUpperCase()}</span>`;

    } else {
        // التشفير من الإنجليزية إلى لغتك (مع أزرار النطق الجديدة)
        let lowerText = input.toLowerCase();
        let lines = lowerText.split("\n");
        let finalSymbolsLines = [];
        let finalHTML = "";

        lines.forEach(line => {
            let words = line.split(" ");
            let lineSymbols = [];
            let lineHTML = "";

            words.forEach(word => {
                let wordSymbols = "";
                let wordSounds = [];

                for (let i = 0; i < word.length; i++) {
                    let char = word[i];
                    let nextChar = word[i + 1];

                    if (zilusAlphabet[char]) {
                        wordSymbols += zilusAlphabet[char].symbol;
                        if (char === nextChar) {
                            wordSounds.push("سس");
                            wordSymbols += zilusAlphabet[char].symbol;
                            i++; 
                        } else {
                            wordSounds.push(zilusAlphabet[char].sound);
                        }
                    } else {
                        wordSymbols += char;
                    }
                }
                lineSymbols.push(wordSymbols);
                
                if(wordSounds.length > 0) {
                    let wordSoundText = wordSounds.join("");
                    // هنا بناء مربع الكلمة وبداخله زر النطق المخصص 🔊
                    lineHTML += `
                    <div class="word-block">
                        <span class="word-text">${wordSoundText}</span>
                        <button class="btn-speak" onclick="speakText('${wordSoundText}')">🔊 نطق</button>
                    </div>`;
                } else if(word.trim() !== "") {
                    lineHTML += `<span style="color:#8b949e; margin:0 4px;">${word}</span> `;
                }
            });
            finalSymbolsLines.push(lineSymbols.join(" "));
            finalHTML += `<div>${lineHTML}</div>`;
        });

        symbolsOutput.innerHTML = finalSymbolsLines.join("\n");
        englishOutput.innerHTML = finalHTML;
    }
}

function speakText(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ar-SA'; 
        utterance.rate = 0.75; // سرعة فخمة وموزونة لنطق القواعد الصعبة بوضوح
        window.speechSynthesis.speak(utterance);
    }
}
</script>
</body>
</html>
